{% extends "base.html" %}
{% block content %}
    
    <div class="container">
        <header class="header">
            <h1 class="header__logo"><a href="{{ url_for('main.index') }}">Evan Fetherolf</a></h1>
            <nav class="header__nav">
                <ul>
                    <li><a href="#">GitHub</a></li>
                    <li><a href="#">LinkedIn</a></li>
                    <li><a href="#">Blog</a></li>
                </ul>
            </nav>
            
        </header>
    </div>
    <div class="container">
        {% for post in posts %}
            <article class="post">
                <h2 class="post__title">{{ post.title }}</h2>
                <span class="post__dateline">{{ post.author }} | {{ post.date_posted }}</span>
                <p class="post__content">{{ post.content }}</p>
            </article>
        {% endfor %}
    </div>
    
{% endblock content %}
